name: Weekly Map Update

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 6:00 AM UTC
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  update-map:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Needed to commit orgs_index.json back to the repo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run map update script
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_ID: ${{ secrets.AIRTABLE_TABLE_ID }}
          AIRTABLE_VIEW_NAME: ${{ secrets.AIRTABLE_VIEW_NAME }}
          AIRTABLE_NETWORKS_TABLE_ID: ${{ secrets.AIRTABLE_NETWORKS_TABLE_ID }}
          AIRTABLE_CATEGORIES_TABLE_ID: ${{ secrets.AIRTABLE_CATEGORIES_TABLE_ID }}
          MAPBOX_SK_TOKEN: ${{ secrets.MAPBOX_SK_TOKEN }}
        run: python auto_update_map.py

      - name: Commit and push orgs_index.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add orgs_index.json
          git diff --cached --quiet || git commit -m "Weekly map update"
          git push
